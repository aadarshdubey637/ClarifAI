services:
  # Backend Service
  - type: web
    name: clarifai-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
      - key: GROQ_API_KEY
      - key: GEMINI_API_KEY
      - key: SECRET_KEY
      - key: ALGORITHM
        value: HS256

  # Frontend Service (Static Site)
  - type: static
    name: clarifai-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
